services:
  db:
    image: mysql:8.0
    container_name: course_hub_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: coursehub
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: course_hub_app
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://user:password@db/coursehub
    volumes:
      - ./uploads:/app/uploads
      - .:/app
    depends_on:
      - db

volumes:
  db_data:
