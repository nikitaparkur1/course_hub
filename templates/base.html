<!doctype html>
<html lang="ru" class="antialiased text-zinc-900 bg-zinc-50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>База Знаний</title>
    <!-- Tailwind CSS (CDN для разработки) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              zinc: {
                50: "#fafafa",
                100: "#f4f4f5",
                200: "#e4e4e7",
                300: "#d4d4d8",
                400: "#a1a1aa",
                500: "#71717a",
                600: "#52525b",
                700: "#3f3f46",
                800: "#27272a",
                900: "#18181b",
                950: "#09090b",
              },
            },
            fontFamily: { sans: ["Inter", "sans-serif"] },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Стиль для Markdown, переопределенный под наш дизайн -->
    <style>
      .prose pre {
        background-color: #18181b;
        color: #f4f4f5;
        padding: 1.5rem;
        border-radius: 0.5rem;
        overflow-x: auto;
        font-size: 0.875rem;
      }
      .prose code {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      .prose h1,
      .prose h2,
      .prose h3 {
        color: #09090b;
        font-weight: 700;
        margin-top: 2em;
        margin-bottom: 1em;
      }
      .prose a {
        color: #52525b;
        text-decoration: underline;
        text-underline-offset: 4px;
      }
      .prose img {
        border-radius: 0.5rem;
        border: 1px solid #e4e4e7;
        margin: 2rem 0;
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col">
    <!-- Минималистичный Navbar -->
    <header class="bg-white border-b border-zinc-200 py-4 sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <a
          href="/"
          class="text-xl font-bold tracking-tight text-zinc-950 flex items-center gap-2"
        >
          <span
            class="bg-zinc-900 text-white w-8 h-8 flex items-center justify-center rounded-md text-sm"
            >БЗ</span
          >
          База Знаний
        </a>
        <a
          href="/upload"
          class="hidden sm:inline-flex px-4 py-2 bg-zinc-900 text-white text-sm font-medium rounded-md hover:bg-zinc-800 transition-colors"
        >
          Добавить урок
        </a>
      </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto px-6 py-10">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
